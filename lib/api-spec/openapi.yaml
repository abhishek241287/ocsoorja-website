openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
  /contact:
    post:
      operationId: submitContactForm
      tags: [contact]
      summary: Submit contact form
      description: Receives a contact form submission and sends an email
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ContactInput"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ContactResponse"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /blog/publish:
    post:
      operationId: publishBlogArticle
      tags: [blog]
      summary: Publish a blog article (development workspace only)
      description: >
        Writes a new article entry into the website source (src/data/blog.ts)
        and saves its cover image under public/images/articles/. Only available
        in the development workspace; returns 404 in production.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BlogPublishInput"
      responses:
        "200":
          description: Article written to the website source
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BlogPublishResponse"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Not available (production)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: An article with this slug already exists
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /gallery/publish:
    post:
      operationId: publishGalleryPhotos
      tags: [gallery]
      summary: Publish Installation Gallery photos (development workspace only)
      description: >
        Saves uploaded photos under public/images/gallery/<category>/ and
        appends a minimal entry (category + auto id/slug/publishDate only) to
        that category's existing data file in src/data/gallery/. Only
        available in the development workspace; returns 404 in production.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GalleryPublishInput"
      responses:
        "200":
          description: Photos written to the website source
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GalleryPublishResponse"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Not available (production)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status
    ContactInput:
      type: object
      required: [name, email, message]
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 200
        email:
          type: string
          format: email
          maxLength: 254
        phone:
          type: string
          maxLength: 20
        company:
          type: string
          maxLength: 200
        message:
          type: string
          minLength: 1
          maxLength: 5000
    ContactResponse:
      type: object
      required: [ok]
      properties:
        ok:
          type: boolean
    ErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          type: string
    BlogPublishInput:
      type: object
      required: [title, category, articleText, imageDataUrl]
      properties:
        title:
          type: string
          minLength: 8
          maxLength: 160
        category:
          type: string
          minLength: 2
          maxLength: 40
        articleText:
          type: string
          minLength: 100
          maxLength: 100000
        imageDataUrl:
          type: string
          description: Cover image as a base64 data URL (png, jpeg or webp)
          minLength: 50
          maxLength: 16000000
        excerpt:
          type: string
          maxLength: 300
        author:
          type: string
          maxLength: 80
    BlogPublishResponse:
      type: object
      required: [ok, slug, url]
      properties:
        ok:
          type: boolean
        slug:
          type: string
        url:
          type: string
    GalleryCategory:
      type: string
      enum:
        - residential
        - commercial
        - industrial
        - solar
        - battery
        - ev
        - hybrid-inverter
        - lifepo4
    GalleryPublishInput:
      type: object
      required: [category, images]
      properties:
        category:
          $ref: "#/components/schemas/GalleryCategory"
        images:
          type: array
          minItems: 1
          maxItems: 20
          items:
            type: string
            description: Photo as a base64 data URL (png, jpeg or webp)
            minLength: 50
            maxLength: 16000000
    GalleryPublishResponse:
      type: object
      required: [ok, count]
      properties:
        ok:
          type: boolean
        count:
          type: integer

