<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <!-- Battery body -->
  <rect x="50" y="40" width="100" height="120" rx="8" fill="#2D5F3F" stroke="#1A3A28" stroke-width="2"/>
  
  <!-- LCD Display -->
  <rect x="70" y="60" width="60" height="25" rx="3" fill="#B8D4A8" stroke="#1A3A28" stroke-width="1"/>
  
  <!-- Battery icon on display -->
  <rect x="80" y="67" width="15" height="10" rx="1" fill="#2D5F3F"/>
  <rect x="95" y="69" width="2" height="6" fill="#2D5F3F"/>
  
  <!-- Battery level bars -->
  <rect x="82" y="69" width="2" height="6" fill="#4CAF50"/>
  <rect x="85" y="69" width="2" height="6" fill="#4CAF50"/>
  <rect x="88" y="69" width="2" height="6" fill="#4CAF50"/>
  <rect x="91" y="69" width="2" height="6" fill="#8BC34A"/>
  
  <!-- Control buttons -->
  <circle cx="110" cy="72" r="3" fill="#1A3A28" opacity="0.6"/>
  <circle cx="120" cy="72" r="3" fill="#1A3A28" opacity="0.6"/>
  
  <!-- LED indicator -->
  <circle cx="115" cy="72" r="2" fill="#FF5252"/>
  
  <!-- Ventilation slots -->
  <line x1="60" y1="100" x2="140" y2="100" stroke="#1A3A28" stroke-width="1" opacity="0.3"/>
  <line x1="60" y1="105" x2="140" y2="105" stroke="#1A3A28" stroke-width="1" opacity="0.3"/>
  <line x1="60" y1="110" x2="140" y2="110" stroke="#1A3A28" stroke-width="1" opacity="0.3"/>
  <line x1="60" y1="115" x2="140" y2="115" stroke="#1A3A28" stroke-width="1" opacity="0.3"/>
  
  <!-- Output ports -->
  <rect x="65" y="130" width="25" height="15" rx="2" fill="#1A3A28" stroke="#0F2419" stroke-width="1"/>
  <rect x="110" y="130" width="25" height="15" rx="2" fill="#1A3A28" stroke="#0F2419" stroke-width="1"/>
  
  <!-- Port labels -->
  <text x="77.5" y="140" font-family="Arial, sans-serif" font-size="6" fill="#B8D4A8" text-anchor="middle">OUT</text>
  <text x="122.5" y="140" font-family="Arial, sans-serif" font-size="6" fill="#B8D4A8" text-anchor="middle">IN</text>
  
  <!-- Brand accent -->
  <circle cx="100" y="50" r="3" fill="#4CAF50"/>
  
  <!-- Power symbol -->
  <path d="M 100 165 L 100 175 M 95 170 A 5 5 0 0 1 105 170" stroke="#4CAF50" stroke-width="2" fill="none" stroke-linecap="round"/>
  
  <!-- Eco/Green indicators -->
  <circle cx="60" cy="50" r="2" fill="#8BC34A"/>
  <circle cx="140" cy="50" r="2" fill="#8BC34A"/>
</svg>
